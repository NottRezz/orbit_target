<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>orbit_target</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Idle/targeting crosshair -->
  <div id="crosshair"></div>

  <!-- Soft-target bracket (snaps to entity). sm-cross is the X shown during transition -->
  <div id="soft-marker">
    <div class="b tl"></div>
    <div class="b tr"></div>
    <div class="b bl"></div>
    <div class="b br"></div>
    <div class="sm-cross"></div>
  </div>

  <!-- Soft-target info (health + distance, no label) -->
  <div id="soft-info">
    <div id="s-bar-track"><div id="s-bar-fill"></div></div>
    <div id="s-meta"><span id="s-dist"></span><span id="s-threat"></span></div>
  </div>

  <!-- Lock-on X markers + floating HP bars (all pooled in app.js) -->
  <div id="ring-layer"></div>

  <script src="app.js"></script>
</body>
</html>
